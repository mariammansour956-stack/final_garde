apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: shopease-app-http-probes
  namespace: monitoring
  labels:
    release: monitoring
spec:
  interval: 30s
  module: http_2xx
  prober:
    url: blackbox-prometheus-blackbox-exporter.monitoring.svc.cluster.local:9115
  targets:
    staticConfig:
      static:
        - http://frontend.prod.svc.cluster.local/
        - http://user-service.prod.svc.cluster.local:8001/docs
        - http://order-service.prod.svc.cluster.local:8002/docs
        - http://notification-service.prod.svc.cluster.local:8003/docs
        - http://shopease-dev-alb-989787674.us-west-1.elb.amazonaws.com/
