apiVersion: v1
kind: ConfigMap
metadata:
  name: shopease-application-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  shopease-application.json: |
    {
      "uid": "shopease-application",
      "title": "ShopEase Application",
      "tags": ["shopease", "application", "prod"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Application Availability",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "avg(probe_success{namespace=\"monitoring\"}) * 100",
              "legendFormat": "Availability %",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "orange", "value": 80},
                  {"color": "green", "value": 95}
                ]
              }
            }
          },
          "gridPos": {"h": 6, "w": 6, "x": 0, "y": 0}
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Response Time",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "probe_duration_seconds{namespace=\"monitoring\"}",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 6, "y": 0}
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Synthetic Request Rate",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "sum(rate(probe_success{namespace=\"monitoring\"}[5m])) by (instance)",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8}
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Synthetic Error Rate",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "100 * (1 - avg_over_time(probe_success{namespace=\"monitoring\"}[5m]))",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent"
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8}
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Real Request Rate - App Metrics",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=\"prod\",handler!=\"/metrics\"}[5m])) by (service)",
              "legendFormat": "{{service}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16}
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Real Error Rate - App Metrics",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "100 * sum(rate(http_requests_total{namespace=\"prod\",status=~\"5..\"}[5m])) by (service) / sum(rate(http_requests_total{namespace=\"prod\",handler!=\"/metrics\"}[5m])) by (service)",
              "legendFormat": "{{service}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent"
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16}
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Real Response Time P95 - App Metrics",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{namespace=\"prod\",handler!=\"/metrics\"}[5m])) by (le, service))",
              "legendFormat": "{{service}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 24}
        },
        {
          "id": 8,
          "type": "stat",
          "title": "Orders Created - Total",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "sum(orders_created_total)",
              "legendFormat": "Orders Created",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            }
          },
          "gridPos": {"h": 8, "w": 6, "x": 12, "y": 24}
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "EC2 Cloud Nodes CPU Usage",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "100 - (avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent"
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 32}
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "EC2 Cloud Nodes Memory Usage",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "100 * (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes))",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent"
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 32}
        }
      ]
    }
